<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer circle representing the wheel -->
  <circle cx="50" cy="50" r="40" stroke="black" stroke-width="5" fill="none" />

  <!-- Spokes of the wheel -->
  <line x1="50" y1="50" x2="80" y2="50" stroke="black" stroke-width="5" />
  <line x1="50" y1="50" x2="20" y2="50" stroke="black" stroke-width="5" />
  <line x1="50" y1="50" x2="50" y2="80" stroke="black" stroke-width="5" />
  <line x1="50" y1="50" x2="50" y2="20" stroke="black" stroke-width="5" />
</svg>
